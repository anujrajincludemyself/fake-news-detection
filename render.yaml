services:
  - type: web
    name: fake-news-ml-service
    runtime: python
    rootDir: ml-service
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: mkdir -p /tmp/nltk_data && uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: NLTK_DATA
        value: /tmp/nltk_data
      - key: PYTHONUNBUFFERED
        value: "1"
